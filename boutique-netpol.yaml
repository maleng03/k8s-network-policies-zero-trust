apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: boutique
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: boutique
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# frontend -> allowed backends
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-egress
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector: { matchLabels: { app: productcatalogservice } }
      ports:
        - protocol: TCP
          port: 3550
    - to:
        - podSelector: { matchLabels: { app: currencyservice } }
      ports:
        - protocol: TCP
          port: 7000
    - to:
        - podSelector: { matchLabels: { app: cartservice } }
      ports:
        - protocol: TCP
          port: 7070
    - to:
        - podSelector: { matchLabels: { app: recommendationservice } }
      ports:
        - protocol: TCP
          port: 8080
    - to:
        - podSelector: { matchLabels: { app: shippingservice } }
      ports:
        - protocol: TCP
          port: 50051
    - to:
        - podSelector: { matchLabels: { app: checkoutservice } }
      ports:
        - protocol: TCP
          port: 5050
    - to:
        - podSelector: { matchLabels: { app: adservice } }
      ports:
        - protocol: TCP
          port: 9555

---
# allow ingress from frontend
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: productcatalog-ingress
  namespace: boutique
spec:
  podSelector:
    matchLabels:
      app: productcatalogservice
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: { matchLabels: { app: frontend } }
        - podSelector: { matchLabels: { app: recommendationservice } }
        - podSelector: { matchLabels: { app: checkoutservice } }
      ports:
        - protocol: TCP
          port: 3550
